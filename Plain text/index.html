<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이룸</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    }

    body{
      background:#f5f6f8;
      color:#222;
    }

    nav{
      position:sticky;
      top:0;
      width:100%;
      background:#ffffff;
      border-bottom:1px solid rgba(0,0,0,0.08);
      z-index:1000;
    }

    .nav-inner{
      max-width:1200px;
      margin:0 auto;
      display:flex;
      align-items:center;
      min-height:78px;
      padding:0 20px;
    }

    .logo{
      font-size:22px;
      font-weight:700;
      color:#c9a96e;
      text-decoration:none;
      line-height:1.2;
    }

    .main{
      max-width:1200px;
      margin:0 auto;
      text-align:center;
      padding:24px 16px 60px;
    }

    .desc{
      font-size:14px;
      color:#444;
      margin:10px 0 24px;
      line-height:1.6;
    }

    .hero{
      background:
        linear-gradient(rgba(255,255,255,0.58), rgba(255,255,255,0.58)),
        url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
      padding:28px 0 50px;
    }

    .card-wrap{
      max-width:560px;
      margin:0 auto;
    }

    .card{
      display:block;
      width:100%;
      background:#e9edf1;
      border:1px solid rgba(0,0,0,0.06);
      border-radius:22px;
      padding:38px 16px;
      margin-bottom:18px;
      text-decoration:none;
      color:#222;
      font-size:24px;
      font-weight:700;
      line-height:1.2;
    }

    .card:last-child{
      margin-bottom:0;
    }

    @media (min-width:769px){
      .main{
        padding:30px 20px 70px;
      }

      .desc{
        font-size:15px;
        margin:14px 0 30px;
      }

      .hero{
        padding:40px 0 60px;
      }

      .card{
        font-size:28px;
        padding:42px 20px;
        margin-bottom:22px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="#" class="logo">이룸</a>
    </div>
  </nav>

  <main class="main">
    <div class="desc">법률 행정 통합 서비스입니다.</div>

    <section class="hero">
      <div class="card-wrap">
        <a href="#" class="card">휴대폰개통</a>
        <a href="#" class="card">여행</a>
        <a href="#" class="card">공증·인증</a>
        <a href="#" class="card">정책자금</a>
        <a href="#" class="card">세금진단</a>
      </div>
    </section>
  </main>

</body>
</html>
