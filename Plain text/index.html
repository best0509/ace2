<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이룸</title>

<style>

/* 기본 설정 */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
}

body{
  background:#f5f6f8;
  color:#222;

  /* 🔥 핵심: 상단 메뉴 높이만큼 내려주기 */
  padding-top:90px;
}

/* 상단 메뉴 */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#ffffff;
  border-bottom:1px solid rgba(0,0,0,0.08);
  z-index:1000;
}

.nav-inner{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;

  height:90px;
  padding:0 20px;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:#c9a96e;
  text-decoration:none;
}

/* 메인 영역 */
.main{
  max-width:500px;
  margin:auto;
  padding:20px;
  text-align:center;
}

/* 소개 문구 */
.desc{
  margin-bottom:30px;
  font-size:14px;
  color:#666;
}

/* 버튼 카드 */
.card{
  background:#dfe3e8;
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
  background:#d4d9df;
}

</style>
</head>

<body>

<!-- 상단 -->
<nav>
  <div class="nav-inner">
    <a href="#" class="logo">이룸</a>
  </div>
</nav>

<!-- 메인 -->
<div class="main">

  <div class="desc">
    법률·행정 통합 서비스입니다.
  </div>

  <div class="card">휴대폰개통</div>
  <div class="card">여행</div>
  <div class="card">공증 · 인증</div>
  <div class="card">정책자금</div>

</div>

</body>
</html>
