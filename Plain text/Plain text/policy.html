<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책자금 간편조회 | 제이원파트너스</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
}

body{
background:#0f1115;
color:#fff;
line-height:1.6;
}

.hero{
min-height:100vh;
padding:40px 20px;
background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

.hero-inner{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.brand{
color:#d8b56a;
font-size:16px;
letter-spacing:2px;
font-weight:bold;
margin-bottom:15px;
}

h1{
font-size:45px;
margin-bottom:15px;
}

.main-copy{
font-size:22px;
margin-bottom:15px;
}

.desc{
color:#ddd;
font-size:17px;
line-height:1.8;
margin-bottom:25px;
}

.point{
display:inline-block;
padding:8px 14px;
border:1px solid rgba(216,181,106,0.5);
border-radius:30px;
margin-right:10px;
font-size:13px;
color:#f3e0b0;
}

.form-card{
background:rgba(20,24,32,0.9);
border-radius:20px;
padding:30px;
}

.form-card h2{
font-size:26px;
margin-bottom:10px;
}

.agree{
margin-bottom:15px;
font-size:14px;
}

.input-group{
margin-bottom:12px;
}

.input-group input,
.input-group select{
width:100%;
height:45px;
border:none;
border-radius:8px;
padding:10px;
background:rgba(255,255,255,0.1);
color:#fff;
}

.btn{
width:100%;
height:48px;
border:none;
border-radius:10px;
background:#f0c76a;
color:#111;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:12px;
}

.result h3{
color:#f0c76a;
margin-bottom:10px;
}

.result-amount{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.kakao{
display:block;
margin-top:10px;
text-align:center;
padding:12px;
background:#f0c76a;
color:#111;
border-radius:10px;
font-weight:bold;
text-decoration:none;
}

@media(max-width:900px){

.hero-inner{
grid-template-columns:1fr;
}

h1{
font-size:34px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-inner">

<div>

<div class="brand">제이원파트너스</div>

<h1>정책자금 예상 대출한도 조회</h1>

<div class="main-copy">온라인 입력만으로 빠르게 확인</div>

<div class="desc">
상호, 사업자 형태, 업종, 전년도 매출만 입력하면
예상 가능한 정책자금 대출한도를 간편하게 확인할 수 있습니다.
</div>

<span class="point">간편조회</span>
<span class="point">AI분석</span>
<span class="point">카카오상담</span>

</div>

<div class="form-card">

<h2>예상 대출금액 조회</h2>

<div class="agree">
<input type="checkbox" id="agree">
개인정보 수집 및 이용에 동의합니다.
</div>

<div class="input-group">
<input type="text" id="company" placeholder="상호">
</div>

<div class="input-group">
<select id="type">
<option value="">사업자 형태 선택</option>
<option>개인사업자</option>
<option>법인사업자</option>
</select>
</div>

<div class="input-group">
<input type="text" id="industry" placeholder="업종">
</div>

<div class="input-group">
<input type="text" id="sales" placeholder="전년도 매출 (숫자)">
</div>

<div class="input-group">
<input type="text" id="phone" placeholder="연락처">
</div>

<button class="btn" onclick="calc()">AI 예상 한도 조회</button>

<div class="result" id="result">

<h3>AI 예상 분석 결과</h3>

<div class="result-amount" id="amount"></div>

<div id="desc"></div>

<a class="kakao" id="kakao" href="#">카카오채널 상담 연결</a>

</div>

</div>

</div>

</section>

<script>

function calc(){

const agree=document.getElementById("agree").checked;
const sales=document.getElementById("sales").value;

if(!agree){
alert("개인정보 동의가 필요합니다");
return;
}

if(sales==""){
alert("전년도 매출을 입력해주세요");
return;
}

let loan=sales*0.15;

if(loan<10000000) loan=10000000;
if(loan>200000000) loan=200000000;

document.getElementById("amount").innerHTML=
"약 "+Number(loan).toLocaleString()+"원";

document.getElementById("desc").innerHTML=
"입력 정보를 기준으로 예상 가능한 정책자금 한도입니다.";

document.getElementById("result").style.display="block";

document.getElementById("kakao").href=
"https://pf.kakao.com/_채널주소";

}

</script>

</body>
</html>
